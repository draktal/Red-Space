- type: entity
  id: DoubleGlassAirlock
  parent: AirlockGlass
  description: Он открывается, он закрывается, и он может вас раздавить.
  name: большой стеклянный шлюз
  suffix: Двойной
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Effects/glass_hit.ogg"
  - type: Sprite
    sprite: Adventure/Structures/Doors/Double/double_glass.rsi
    snapCardinals: false
    offset: 0.5,0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,1.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassAirlockLayer
  - type: Transform
    noRot: false
  - type: Construction
    graph: AirlockDouble
    node: glassAirlockDouble


- type: entity
  id: TripleGlassAirlock
  parent: AirlockGlass
  description: Он открывается, он закрывается, и он может вас раздавить.
  name: большой стеклянный шлюз
  suffix: Тройной
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Effects/glass_hit.ogg"
  - type: Sprite
    sprite: Adventure/Structures/Doors/Triple/triple_glass.rsi
    snapCardinals: false
    offset: 0,0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.49,-0.49,1.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassAirlockLayer
  - type: Transform
    noRot: false
  - type: Construction
    graph: AirlockTriple
    node: glassAirlockTriple


#из-за невозможности растянуть тень по размерам шлюзов, шлюзы не являющиеся стеклянными не будут работать корректно, поэтому придётся ограниться тоглько стеклянными.

# каркас
- type: entity
  id: AirlockAssemblyDouble
  parent: AirlockAssembly
  suffix: Двойной
  name: каркас большого шлюза
  description: Он открывается, он закрывается, и он может вас раздавить.
  components:
  - type: Rotatable
  - type: Transform
    anchored: true
    noRot: false
  - type: Sprite
    sprite: Adventure/Structures/Doors/Double/double_glass.rsi
    state: "assembly"
    snapCardinals: false
    offset: 0.5,0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,1.49,0.49"
        density: 110
        mask:
        - FullTileMask
        layer:
        - HumanoidBlockLayer
  - type: Construction
    graph: AirlockDouble
    node: assembly

